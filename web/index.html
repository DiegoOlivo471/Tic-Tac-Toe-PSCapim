<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <h1>Tic-Tac-Toe</h1>

  <!-- Menu Screen -->
  <div class="screen active" id="screen-menu">
    <p class="menu-label">Game mode</p>
    <div class="menu-btn-group">
      <button class="menu-btn" id="btn-pvp" onclick="selectMode('pvp')">Player vs Player</button>
      <button class="menu-btn" id="btn-pvc" onclick="selectMode('pvc')">Player vs Computer</button>
    </div>

    <div class="difficulty-section" id="difficulty-section">
      <p class="menu-label">Difficulty</p>
      <div class="menu-btn-group">
        <button class="menu-btn" id="btn-easy" onclick="selectDifficulty('easy')">Easy</button>
        <button class="menu-btn" id="btn-hard" onclick="selectDifficulty('hard')">Hard — Minimax AI</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Start Game</button>
  </div>

  <!-- Game Screen -->
  <div class="screen" id="screen-game">
    <p class="status" id="status"></p>
    <div class="board" id="board"></div>
    <button class="restart-btn" onclick="restartGame()">Restart</button>
    <br>
    <button class="back-btn" onclick="goToMenu()">&#8592; Main menu</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
